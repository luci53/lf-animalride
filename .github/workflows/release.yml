name: Release

# Push a version tag (e.g. `git tag v2.0.0 && git push origin v2.0.0`) to cut
# a release: this bundles the resource into a versioned zip and publishes a
# GitHub release with auto-generated notes.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build resource archive
        run: |
          mkdir -p dist/lf-animalride
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='*.zip' \
            ./ dist/lf-animalride/
          cd dist && zip -r "lf-animalride-${{ steps.version.outputs.version }}.zip" lf-animalride

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: lf-animalride ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/lf-animalride-${{ steps.version.outputs.version }}.zip
